<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RStudio Debug Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #64b5f6;
            margin-bottom: 10px;
            border-bottom: 2px solid #64b5f6;
            padding-bottom: 10px;
        }
        .log {
            font-size: 12px;
            margin: 8px 0;
            padding: 8px;
            background: #0a0a0a;
            border-left: 3px solid #666;
            border-radius: 4px;
        }
        .log.ok {
            border-left-color: #4caf50;
            color: #4caf50;
        }
        .log.error {
            border-left-color: #f44336;
            color: #f44336;
        }
        .log.warn {
            border-left-color: #ff9800;
            color: #ff9800;
        }
        .log.info {
            border-left-color: #2196f3;
            color: #2196f3;
        }
        .summary {
            font-size: 14px;
            margin-top: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 6px;
            border-left: 4px solid #64b5f6;
        }
        .test-result {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            font-size: 13px;
        }
        .test-result .status {
            font-weight: bold;
            min-width: 50px;
        }
        .test-result.pass .status {
            color: #4caf50;
        }
        .test-result.fail .status {
            color: #f44336;
        }
        .dom-check {
            font-size: 11px;
            margin: 6px 0;
            padding: 6px;
            background: #0a0a0a;
            border-radius: 4px;
        }
        code {
            background: #0a0a0a;
            padding: 2px 6px;
            border-radius: 3px;
            color: #81d4fa;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }
        @media (max-width: 768px) {
            .grid-2col, .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- INITIALIZATION TESTS -->
    <div class="section">
        <div class="title">🚀 Initialization Tests</div>
        <div id="init-tests"></div>
    </div>

    <!-- DOM CHECKS -->
    <div class="section">
        <div class="title">📍 DOM Elements Check</div>
        <div id="dom-checks"></div>
    </div>

    <!-- API TESTS -->
    <div class="section">
        <div class="title">🔌 API Fetch Tests</div>
        <div id="api-tests"></div>
    </div>

    <!-- FUNCTION TESTS -->
    <div class="section">
        <div class="title">⚙️ Function Execution Tests</div>
        <div id="func-tests"></div>
    </div>

    <!-- VISUAL CHECKS -->
    <div class="section">
        <div class="title">👁️ Visual Rendering Checks</div>
        <div id="visual-checks"></div>
    </div>

    <!-- STATE CHECK -->
    <div class="section">
        <div class="title">💾 State & Cache Check</div>
        <div id="state-checks"></div>
    </div>

    <!-- SUMMARY -->
    <div class="section" style="grid-column: 1 / -1;">
        <div class="title">📊 Summary Report</div>
        <div id="summary"></div>
    </div>
</div>

<script>
// ============ TEST FRAMEWORK ============
const tests = {
    init: [],
    dom: [],
    api: [],
    func: [],
    visual: [],
    state: []
};

function log(category, message, status = 'info') {
    const el = document.getElementById(`${category}-tests`);
    if (!el) return;

    const div = document.createElement('div');
    div.className = `log ${status}`;
    div.textContent = message;
    el.appendChild(div);

    tests[category].push({ message, status });
    console.log(`[${category.toUpperCase()}] ${message}`, status);
}

function testPass(category, name) {
    log(category, `✓ ${name}`, 'ok');
}

function testFail(category, name, reason = '') {
    const msg = reason ? `✗ ${name} — ${reason}` : `✗ ${name}`;
    log(category, msg, 'error');
}

function testWarn(category, name, message = '') {
    const msg = message ? `⚠ ${name}: ${message}` : `⚠ ${name}`;
    log(category, msg, 'warn');
}

// ============ INITIALIZATION TESTS ============
async function runInitTests() {
    console.log('\n========== INIT TESTS ==========');

    // Test 1: Check if app div exists
    const appDiv = document.getElementById('app');
    if (appDiv) {
        testPass('init', 'App container (#app) found');
    } else {
        testFail('init', 'App container (#app) not found');
        return;
    }

    // Test 2: Check user-nm element
    const userNm = document.getElementById('user-nm');
    if (userNm) {
        testPass('init', 'User name element (#user-nm) found');
    } else {
        testFail('init', 'User name element (#user-nm) not found');
    }

    // Test 3: Wait for window load event
    if (document.readyState === 'loading') {
        testWarn('init', 'Page still loading', 'Wait for DOMContentLoaded');
    } else {
        testPass('init', 'Page fully loaded');
    }

    // Test 4: Check if init function exists
    if (typeof window.init === 'function') {
        testPass('init', 'init() function exists');
    } else {
        testFail('init', 'init() function not found');
        return;
    }

    // Test 5: Try to call init()
    try {
        log('init', 'Attempting to call init()...');
        await window.init();
        testPass('init', 'init() executed successfully');
    } catch (err) {
        testFail('init', 'init() threw error', err.message);
    }
}

// ============ DOM CHECKS ============
function runDomChecks() {
    console.log('\n========== DOM CHECKS ==========');

    const elements = {
        'app': 'Main app container',
        'user-nm': 'User name display',
        'calbar': 'Calendar bar container',
        'panel-gen': 'Generator panel',
        'panel-clientes': 'Clients panel',
        'panel-refs': 'References panel',
        'panel-cals': 'Calendars panel',
        'ctl-fmt-drop': 'Format picker dropdown',
        'ctl-model-drop': 'Model picker dropdown',
        'pgrid': 'Post grid container',
        'chdr': 'Calendar header',
        'filtrow': 'Filter row',
        'cur': 'Custom cursor element',
        'bgc': 'Background canvas'
    };

    for (const [id, desc] of Object.entries(elements)) {
        const el = document.getElementById(id);
        if (el) {
            const display = window.getComputedStyle(el).display;
            const visibility = window.getComputedStyle(el).visibility;
            const position = window.getComputedStyle(el).position;

            if (visibility === 'hidden') {
                testWarn('dom', `${id}: ${desc}`, `visibility:hidden`);
            } else if (position === 'fixed' && id === 'cur') {
                testPass('dom', `${id}: ${desc} (position:fixed - expected for cursor)`);
            } else if (display === 'none' && !['chdr', 'filtrow', 'panel-cals', 'panel-clientes', 'panel-refs'].includes(id)) {
                testWarn('dom', `${id}: ${desc}`, `display:none`);
            } else {
                testPass('dom', `${id}: ${desc}`);
            }
        } else {
            testFail('dom', `${id}: ${desc} — Element not found in DOM`);
        }
    }

    // Check for "stuck in corner" issues
    const fixedElements = document.querySelectorAll('[style*="position:fixed"], [style*="position: fixed"]');
    if (fixedElements.length > 0) {
        log('dom', `Found ${fixedElements.length} fixed-position elements:`);
        fixedElements.forEach(el => {
            const rect = el.getBoundingClientRect();
            const styles = window.getComputedStyle(el);
            const info = `${el.id || el.className}: top=${Math.round(rect.top)}px, left=${Math.round(rect.left)}px, z-index=${styles.zIndex}`;
            log('dom', `  → ${info}`);
        });
    }
}

// ============ API TESTS ============
async function runApiTests() {
    console.log('\n========== API TESTS ==========');

    const endpoints = [
        '/api/clients',
        '/api/calendars',
        '/api/refs'
    ];

    for (const endpoint of endpoints) {
        try {
            log('api', `Fetching ${endpoint}...`);
            const response = await fetch(endpoint, {
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                const data = await response.json();
                testPass('api', `${endpoint}: Status ${response.status}, got ${Array.isArray(data) ? data.length : '?'} items`);
            } else {
                testWarn('api', `${endpoint}: Status ${response.status} (${response.statusText})`);
            }
        } catch (err) {
            testFail('api', `${endpoint}: ${err.message}`);
        }
    }
}

// ============ FUNCTION TESTS ============
async function runFunctionTests() {
    console.log('\n========== FUNCTION TESTS ==========');

    const functions = [
        'renderFmtPicker',
        'renderCalBar',
        'getCals',
        'getClients',
        'getRefs',
        'tab',
        'openCal',
        'pickModel',
        'pickFmt'
    ];

    for (const funcName of functions) {
        if (typeof window[funcName] === 'function') {
            testPass('func', `${funcName}() defined`);
        } else {
            testFail('func', `${funcName}() not found or not a function`);
        }
    }

    // Test renderFmtPicker specifically
    try {
        log('func', 'Testing renderFmtPicker()...');
        window.renderFmtPicker();
        const drop = document.getElementById('ctl-fmt-drop');
        const hasButtons = drop && drop.querySelectorAll('button').length > 0;
        if (hasButtons) {
            testPass('func', `renderFmtPicker() executed, rendered ${drop.querySelectorAll('button').length} format buttons`);
        } else {
            testWarn('func', 'renderFmtPicker() executed', 'No buttons rendered in dropdown');
        }
    } catch (err) {
        testFail('func', 'renderFmtPicker() error', err.message);
    }

    // Test renderCalBar specifically
    try {
        log('func', 'Testing renderCalBar()...');
        await window.renderCalBar();
        const bar = document.getElementById('calbar');
        const hasTabs = bar && bar.querySelectorAll('button').length > 0;
        if (hasTabs) {
            testPass('func', `renderCalBar() executed, rendered ${bar.querySelectorAll('button').length} calendar tabs`);
        } else {
            testWarn('func', 'renderCalBar() executed', 'No tabs rendered');
        }
    } catch (err) {
        testFail('func', 'renderCalBar() error', err.message);
    }

    // Test getCals specifically
    try {
        log('func', 'Testing getCals()...');
        const cals = await window.getCals();
        if (Array.isArray(cals)) {
            testPass('func', `getCals() returned array with ${cals.length} calendars`);
            if (cals.length > 0) {
                log('func', `  → First calendar: ${cals[0].name || cals[0].id}`);
            }
        } else {
            testFail('func', 'getCals() did not return array');
        }
    } catch (err) {
        testFail('func', 'getCals() error', err.message);
    }
}

// ============ VISUAL CHECKS ============
function runVisualChecks() {
    console.log('\n========== VISUAL CHECKS ==========');

    // Check if the main app is visible
    const app = document.getElementById('app');
    if (app) {
        const styles = window.getComputedStyle(app);
        const rect = app.getBoundingClientRect();

        log('visual', `App element: width=${Math.round(rect.width)}px, height=${Math.round(rect.height)}px`);
        log('visual', `Display: ${styles.display}, Visibility: ${styles.visibility}`);

        if (styles.display === 'none') {
            testFail('visual', 'App is display:none', 'App not visible');
        } else if (styles.visibility === 'hidden') {
            testFail('visual', 'App is visibility:hidden', 'App not visible');
        } else {
            testPass('visual', 'App container is visible');
        }
    }

    // Check topbar and navigation
    const topbar = document.querySelector('.topbar');
    if (topbar) {
        const navButtons = topbar.querySelectorAll('button.nt');
        testPass('visual', `Navigation bar found with ${navButtons.length} tab buttons`);
    } else {
        testFail('visual', 'Navigation bar not found');
    }

    // Check if there's anything "stuck" in corners
    const topLeft = document.elementsFromPoint(10, 10);
    log('visual', `Top-left corner elements: ${topLeft.length > 0 ? topLeft[0].id || topLeft[0].className : 'none'}`);

    // Check overflow issues
    const body = document.body;
    const bodyStyles = window.getComputedStyle(body);
    if (bodyStyles.overflow === 'hidden') {
        testWarn('visual', 'Body has overflow:hidden', 'May hide scrollbars');
    }

    // Check main panel visibility
    const panels = document.querySelectorAll('.panel');
    let activeCount = 0;
    panels.forEach(p => {
        if (p.classList.contains('act')) {
            activeCount++;
            log('visual', `  → Active panel: ${p.id}`);
        }
    });
    if (activeCount === 0) {
        testFail('visual', 'No active panel found');
    } else if (activeCount === 1) {
        testPass('visual', `Panel visibility: 1 active panel`);
    } else {
        testWarn('visual', `Panel visibility: ${activeCount} panels marked as active`);
    }
}

// ============ STATE CHECKS ============
function runStateChecks() {
    console.log('\n========== STATE CHECKS ==========');

    const stateVars = {
        'AM': 'Active model',
        'AF': 'Active format',
        'AT': 'Active type filter',
        'AA': 'Active angle filter',
        'activeCal': 'Active calendar ID',
        'activeClient': 'Active client ID',
        'selRefs': 'Selected references',
        'imgSrcs': 'Image sources cache',
        '_cache': 'Fetch cache'
    };

    for (const [varName, desc] of Object.entries(stateVars)) {
        if (typeof window[varName] !== 'undefined') {
            const value = window[varName];
            let display = String(value).slice(0, 100);
            if (typeof value === 'object') {
                if (value instanceof Set) display = `Set(${value.size})`;
                else if (Array.isArray(value)) display = `Array(${value.length})`;
                else display = `Object(${Object.keys(value).length} keys)`;
            }
            testPass('state', `${varName}: ${desc} = ${display}`);
        } else {
            testFail('state', `${varName}: ${desc} — Not defined`);
        }
    }

    // Check localStorage
    const kie = localStorage.getItem('cliender_kie_key');
    const claude = localStorage.getItem('cliender_claude_key');

    if (kie) {
        testPass('state', 'KIE API key stored in localStorage');
    } else {
        testWarn('state', 'KIE API key not in localStorage', 'Image generation may fail');
    }

    if (claude) {
        testPass('state', 'Claude API key stored in localStorage');
    } else {
        testWarn('state', 'Claude API key not in localStorage', 'Prompt generation may fail');
    }
}

// ============ GENERATE SUMMARY ============
function generateSummary() {
    const summary = document.getElementById('summary');

    let totalTests = 0;
    let passCount = 0;
    let failCount = 0;
    let warnCount = 0;

    for (const category of Object.keys(tests)) {
        tests[category].forEach(t => {
            totalTests++;
            if (t.status === 'ok') passCount++;
            else if (t.status === 'error') failCount++;
            else if (t.status === 'warn') warnCount++;
        });
    }

    const html = `
        <div class="summary">
            <h3>Test Results: ${passCount}/${totalTests} passed</h3>
            <div class="test-result pass">
                <span class="status">✓ PASS</span>
                <span>${passCount} tests passed</span>
            </div>
            <div class="test-result fail">
                <span class="status">✗ FAIL</span>
                <span>${failCount} tests failed</span>
            </div>
            <div class="test-result warn">
                <span class="status">⚠ WARN</span>
                <span>${warnCount} warnings</span>
            </div>

            <h3 style="margin-top: 20px; color: #64b5f6;">Issues Found:</h3>
            <ul style="margin-left: 20px; margin-top: 10px;">
    `;

    // Find all errors and warnings
    const issues = [];
    for (const category of Object.keys(tests)) {
        tests[category].forEach(t => {
            if (t.status === 'error' || t.status === 'warn') {
                issues.push(`<li style="margin: 8px 0;">[${category.toUpperCase()}] ${t.message}</li>`);
            }
        });
    }

    if (issues.length === 0) {
        html += '<li style="color: #4caf50;">✓ No issues found!</li>';
    } else {
        html += issues.join('');
    }

    html += `
            </ul>

            <h3 style="margin-top: 20px; color: #64b5f6;">Next Steps:</h3>
            <ol style="margin-left: 20px; margin-top: 10px;">
                <li style="margin: 8px 0;">Check browser console (F12) for JavaScript errors</li>
                <li style="margin: 8px 0;">Verify API endpoints are accessible at /api/clients, /api/calendars, /api/refs</li>
                <li style="margin: 8px 0;">Check that localStorage has API keys: <code>cliender_kie_key</code> and <code>cliender_claude_key</code></li>
                <li style="margin: 8px 0;">Open browser dev tools Network tab to see fetch requests</li>
                <li style="margin: 8px 0;">If calendars aren't showing: check /api/calendars response in Network tab</li>
            </ol>
        </div>
    `;

    summary.innerHTML = html;
}

// ============ RUN ALL TESTS ============
async function runAllTests() {
    console.clear();
    console.log('🧪 RSTUDIO DEBUG TEST SUITE STARTING');
    console.log('=====================================\n');

    try {
        // Run sync tests first
        runDomChecks();
        runVisualChecks();
        runStateChecks();

        // Run async tests
        await runApiTests();
        await runFunctionTests();
        await runInitTests();

        // Generate summary
        generateSummary();

        console.log('\n✅ TEST SUITE COMPLETE');
        console.log('See debug output above for detailed results');
    } catch (err) {
        console.error('TEST SUITE ERROR:', err);
        const summary = document.getElementById('summary');
        summary.innerHTML = `<div class="summary"><span style="color: #f44336;">⚠️ Test suite failed: ${err.message}</span></div>`;
    }
}

// Start tests when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runAllTests);
} else {
    setTimeout(runAllTests, 500);
}
</script>

</body>
</html>
