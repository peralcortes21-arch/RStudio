<!DOCTYPE html>
<html>
<head>
<title>RStudio Button Test</title>
<style>
body { font-family: monospace; background: #1a1a26; color: #f4f4f8; padding: 20px; }
.test { margin: 10px 0; padding: 10px; border: 1px solid #4a63f5; }
.pass { background: rgba(26, 184, 84, 0.2); color: #1ab854; }
.fail { background: rgba(224, 64, 64, 0.2); color: #e04040; }
button { padding: 8px 16px; margin: 5px; cursor: pointer; }
</style>
</head>
<body>
<h2>🔍 RStudio Button Diagnostics</h2>
<div id="results"></div>

<script>
const results = document.getElementById('results');

function addTest(name, passed, details) {
  const div = document.createElement('div');
  div.className = `test ${passed ? 'pass' : 'fail'}`;
  div.innerHTML = `${passed ? '✓' : '✗'} ${name}<br><small>${details}</small>`;
  results.appendChild(div);
}

// Test 1: Check if iframe can load main app
fetch('http://localhost/')
  .then(r => r.text())
  .then(html => {
    const hasTabHandler = html.includes('tabHandler');
    addTest('HTML has tabHandler', hasTabHandler, 
      hasTabHandler ? 'Found wrapper functions' : 'Missing wrapper functions');
    
    const hasOnClick = html.match(/onclick="/g)?.length || 0;
    addTest('HTML has onclick handlers', hasOnClick > 0, 
      `Found ${hasOnClick} onclick handlers`);
      
    const hasInitFunction = html.includes('async function init');
    addTest('HTML has init() function', hasInitFunction, 'Initialization function found');
    
    const hasTabs = html.includes('data-p=') && html.includes('tab(');
    addTest('HTML has tab system', hasTabs, 'Tab navigation structure found');
  })
  .catch(e => addTest('Fetch HTML', false, e.message));

// Test 2: Inline button test
setTimeout(() => {
  const testBtn = document.createElement('button');
  testBtn.textContent = '🧪 Test Button';
  testBtn.onclick = () => alert('✓ Button works! onclick is functional');
  document.body.appendChild(testBtn);
  addTest('Inline onclick works', true, 'Created test button above');
}, 500);

// Test 3: Check API
fetch('http://localhost/api/calendars')
  .then(r => r.json())
  .then(data => {
    addTest('API responds', Array.isArray(data), `Found ${data.length} calendars`);
  })
  .catch(e => addTest('API call', false, e.message));

</script>
</body>
</html>
